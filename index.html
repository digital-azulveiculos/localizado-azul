<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localizado Azul</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003b8f">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #071b3a;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .btn-instalar {
      position: fixed;
      right: 14px;
      bottom: 18px;
      z-index: 9999;
      background: #0057b8;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0,0,0,.28);
      display: none;
    }
  </style>
</head>

<body>
  <iframe
    src="https://script.google.com/macros/s/AKfycbwiuMXfo6_IcNjQsz-J0DwOzDOYS6fGxCf5ug7wCrnunL85QDMO5vQZG0qrFzznWUexrA/exec"
    allow="clipboard-read; clipboard-write; web-share"
  ></iframe>

  <button id="btnInstalar" class="btn-instalar" onclick="instalarPWA()">
    📲 Instalar app
  </button>

  <script>
    let deferredPrompt = null;
    const btnInstalar = document.getElementById('btnInstalar');

    window.addEventListener('beforeinstallprompt', function(e) {
      const isStandalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
    
      if (isStandalone) return;
    
      e.preventDefault();
      deferredPrompt = e;
      btnInstalar.style.display = 'block';
    });

    async function instalarPWA() {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        btnInstalar.style.display = 'none';
        return;
      }

      if (isIOS) {
        alert('No iPhone: toque no botão Compartilhar do Safari e escolha "Adicionar à Tela de Início".');
        return;
      }

      alert('No Android: abra pelo Chrome e escolha "Adicionar à tela inicial".');
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;
    
    if (isIOS && !isStandalone) {
      btnInstalar.style.display = 'block';
    }
  </script>
</body>
</html>
